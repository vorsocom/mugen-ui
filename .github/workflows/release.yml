name: Release Automation

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode to run"
        required: true
        type: choice
        options:
          - prepare
          - finish
          - publish
      bump:
        description: "Semver bump for prepare mode (ignored if version is set)"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Explicit release version (required for finish/publish modes)"
        required: false
        type: string
      run_gates:
        description: "Run full runtime quality gates during prepare mode"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.1
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run release automation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ inputs.mode }}" == "prepare" ]]; then
            cmd=(tool/release/release.sh prepare --push)

            if [[ -n "${{ inputs.version }}" ]]; then
              cmd+=(--version "${{ inputs.version }}")
            else
              cmd+=(--bump "${{ inputs.bump }}")
            fi

            if [[ "${{ inputs.run_gates }}" != "true" ]]; then
              cmd+=(--skip-gates)
            fi

            "${cmd[@]}"
            exit 0
          fi

          if [[ -z "${{ inputs.version }}" ]]; then
            echo "ERROR: version is required for ${{ inputs.mode }} mode." >&2
            exit 1
          fi

          if [[ "${{ inputs.mode }}" == "finish" ]]; then
            tool/release/release.sh finish --version "${{ inputs.version }}"
            exit 0
          fi

          if [[ "${{ inputs.mode }}" == "publish" ]]; then
            tool/release/release.sh publish --version "${{ inputs.version }}"
            exit 0
          fi

          echo "ERROR: unsupported mode '${{ inputs.mode }}'." >&2
          exit 1
