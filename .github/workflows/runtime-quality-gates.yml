name: Runtime Quality Gates

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  runtime-quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.1
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Architecture dependency check
        run: dart run tool/architecture/check_dependencies.dart

      - name: Flutter tests with coverage
        run: flutter test --coverage

      - name: Enforce line coverage
        run: tool/coverage/check_line_coverage.sh --lcov coverage/lcov.info --minimum 100

      - name: Build web release
        run: flutter build web --release --no-wasm-dry-run
