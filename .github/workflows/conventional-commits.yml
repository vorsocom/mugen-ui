name: Conventional Commits

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  commit-message-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve commit range
        id: range
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "range=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ "${before}" == "0000000000000000000000000000000000000000" ]]; then
            echo "range=${after}^!" >> "${GITHUB_OUTPUT}"
          else
            echo "range=${before}..${after}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Validate commit messages
        run: |
          tool/commitlint/check_conventional_commit.sh --rev-range "${{ steps.range.outputs.range }}"
